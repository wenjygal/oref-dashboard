<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#e85d04;stop-opacity:0.08"/>
      <stop offset="100%" style="stop-color:#e85d04;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#0d0d0d"/>

  <!-- Subtle glow -->
  <ellipse cx="600" cy="280" rx="480" ry="300" fill="url(#glow)"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="5" fill="#e85d04"/>
  <!-- Bottom accent bar -->
  <rect x="0" y="625" width="1200" height="5" fill="#e85d04"/>

  <!-- Outer border -->
  <rect x="0" y="0" width="1200" height="630" fill="none" stroke="#1e1e1e" stroke-width="2"/>

  <!-- IL badge -->
  <rect x="510" y="108" width="180" height="72" rx="10" fill="#1a1010" stroke="#e85d04" stroke-width="2"/>
  <text x="600" y="161" font-family="Arial, Helvetica, sans-serif" font-size="48" font-weight="900" fill="#e85d04" text-anchor="middle" letter-spacing="6">IL</text>

  <!-- Main Hebrew title -->
  <text x="600" y="290" font-family="Arial, Helvetica, sans-serif" font-size="88" font-weight="bold" fill="#ffffff" text-anchor="middle">מצב התראות</text>

  <!-- Horizontal divider -->
  <line x1="300" y1="322" x2="900" y2="322" stroke="#2a2020" stroke-width="1"/>

  <!-- Subtitle -->
  <text x="600" y="376" font-family="Arial, Helvetica, sans-serif" font-size="34" fill="#9ca3af" text-anchor="middle">סיכום נתוני פיקוד העורף בזמן אמת</text>

  <!-- Feature pills -->
  <rect x="244" y="418" width="202" height="46" rx="23" fill="#141414" stroke="#2a2020" stroke-width="1"/>
  <text x="345" y="447" font-family="Arial, Helvetica, sans-serif" font-size="19" fill="#9ca3af" text-anchor="middle">ניתוח סטטיסטי</text>

  <rect x="474" y="418" width="252" height="46" rx="23" fill="#141414" stroke="#2a2020" stroke-width="1"/>
  <text x="600" y="447" font-family="Arial, Helvetica, sans-serif" font-size="19" fill="#9ca3af" text-anchor="middle">מיפוי לפי אזורים</text>

  <rect x="754" y="418" width="202" height="46" rx="23" fill="#141414" stroke="#2a2020" stroke-width="1"/>
  <text x="855" y="447" font-family="Arial, Helvetica, sans-serif" font-size="19" fill="#9ca3af" text-anchor="middle">עדכון שוטף</text>

  <!-- URL -->
  <text x="600" y="566" font-family="Arial, Helvetica, sans-serif" font-size="21" fill="#4b5563" text-anchor="middle">wenjygal.github.io/oref-dashboard</text>
</svg>
