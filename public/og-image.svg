<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">

  <!-- Background -->
  <rect width="1200" height="630" fill="#0d0d0d"/>

  <!-- Accent bars -->
  <rect x="0" y="0" width="1200" height="5" fill="#e85d04"/>
  <rect x="0" y="625" width="1200" height="5" fill="#e85d04"/>

  <!-- Outer border -->
  <rect x="0" y="0" width="1200" height="630" fill="none" stroke="#1e1e1e" stroke-width="2"/>

  <!-- Glow behind missile -->
  <ellipse cx="600" cy="315" rx="200" ry="280" fill="#e85d04" opacity="0.06"/>

  <!-- ═══ MISSILE — centered at x=600, vertical ═══ -->

  <!-- Nose cone -->
  <polygon points="600,105 564,210 636,210" fill="#e85d04"/>

  <!-- Body -->
  <rect x="564" y="208" width="72" height="195" fill="#e85d04"/>

  <!-- Window -->
  <circle cx="600" cy="272" r="18" fill="#0d0d0d" opacity="0.4"/>
  <circle cx="600" cy="272" r="11" fill="#e85d04" opacity="0.45"/>

  <!-- Left fin -->
  <polygon points="564,330 494,450 564,418" fill="#e85d04"/>

  <!-- Right fin -->
  <polygon points="636,330 706,450 636,418" fill="#e85d04"/>

  <!-- Nozzle -->
  <rect x="576" y="400" width="48" height="35" rx="5" fill="#bf4b02"/>

  <!-- Flame outer -->
  <polygon points="576,433 624,433 612,490 600,478 588,490" fill="#f48c06"/>

  <!-- Flame inner -->
  <polygon points="586,433 614,433 607,476 600,468 593,476" fill="#fed7aa"/>

</svg>
